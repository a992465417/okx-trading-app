name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ♻️ 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.ccache
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: 📦 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip python3-venv openjdk-17-jdk-headless git curl unzip autoconf automake libtool ccache pkg-config
          pip3 install --user --upgrade pip buildozer cython setuptools wheel
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🏗️ 编译 APK
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo "y" | buildozer android debug 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Buildozer 失败!"
            exit 1
          fi
          echo "✅ Buildozer 成功!"
          echo "=== 搜索 APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          find .buildozer -name "*.apk" -type f 2>/dev/null
          find /home/runner -name "*.apk" -type f 2>/dev/null
          find / -name "*.apk" -type f 2>/dev/null | head -20

      - name: 📤 上传 APK（广泛搜索）
        if: success()
        run: |
          APK=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find /home/runner -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "❌ 没找到任何 APK!"
            exit 1
          fi
          echo "✅ 找到 APK: $APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: 📤 上传 APK 产物
        if: success() && env.APK_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: OKX-Trader-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error

      - name: 📤 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build.log
          if-no-files-found: warn
